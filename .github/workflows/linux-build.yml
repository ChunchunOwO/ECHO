name: Linux build

on:
  workflow_dispatch:

jobs:
  linux-x64:
    name: Linux x64 AppImage and deb
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            pkg-config \
            fakeroot \
            dpkg \
            rpm \
            binutils \
            ffmpeg \
            libasound2-dev \
            libfreetype-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libxtst6 \
            libdrm2 \
            libgbm1

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare Linux ffmpeg
        run: node scripts/prepare-linux-ffmpeg.mjs

      - name: Build Linux packages
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: echo-next-linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/linux-unpacked/resources/echo-audio-host
            dist/linux-unpacked/resources/tools/ffmpeg
          if-no-files-found: error
